<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — NEXUS</title>
  <meta name="description" content="Log in to your NEXUS account — student employability intelligence platform.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="auth-layout">

  <!-- ─── LEFT PANEL ─────────────────────────────────────────── -->
  <div class="auth-left" aria-hidden="true">

    <div class="auth-left-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <polygon points="12,2 22,7.5 22,16.5 12,22 2,16.5 2,7.5" fill="white" opacity="0.15"/>
        <polygon points="12,2 22,7.5 22,16.5 12,22 2,16.5 2,7.5" fill="none" stroke="white" stroke-width="1.2"/>
        <polygon points="12,6 18,9.5 18,14.5 12,18 6,14.5 6,9.5" fill="#1A1A2E"/>
        <circle cx="12" cy="12" r="2.8" fill="#4CAF50"/>
      </svg>
      NEXUS
    </div>

    <div class="auth-quote-wrap">
      <div class="auth-quote" id="auth-quote-text">
        "Your score updated. A recruiter just searched for you."
      </div>
      <div class="auth-quote-dots" id="auth-quote-dots">
        <div class="auth-quote-dot active"></div>
        <div class="auth-quote-dot"></div>
        <div class="auth-quote-dot"></div>
      </div>
    </div>

    <div class="auth-trust">Trusted by students across 12+ engineering colleges</div>
  </div>

  <!-- ─── RIGHT PANEL ────────────────────────────────────────── -->
  <div class="auth-right">
    <div class="auth-form-wrap">

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">Log in to your NEXUS account</p>

      <!-- Role tabs -->
      <div class="role-tabs" role="tablist" aria-label="Select your role">
        <button class="role-tab active" role="tab" aria-selected="true"  id="tab-student"   data-role="student">Student</button>
        <button class="role-tab"        role="tab" aria-selected="false" id="tab-tpo"        data-role="tpo">College TPO</button>
        <button class="role-tab"        role="tab" aria-selected="false" id="tab-recruiter"  data-role="recruiter">Recruiter</button>
        <button class="role-tab"        role="tab" aria-selected="false" id="tab-mentor"     data-role="mentor">Mentor</button>
      </div>

      <!-- Login form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input class="form-input" type="email" id="login-email" name="email"
                 placeholder="you@college.edu" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrap">
            <input class="form-input has-right" type="password" id="login-password"
                   name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="eye-toggle" id="eye-login" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-forgot">
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit" id="login-submit">Log in →</button>

        <div class="auth-divider">or</div>

        <button type="button" class="social-btn" id="google-login" onclick="void(0)">
          <!-- Google G icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <button type="button" class="social-btn" id="github-login" onclick="void(0)">
          <!-- GitHub icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1A1A2E" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          Continue with GitHub
        </button>

      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html" id="switch-to-signup">Sign up</a></p>

    </div>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
